image:
  repository: operator
  tag: local
  pullPolicy: Never

replicaCount: 1
certManager:
  enabled: true
  install: false   # assume cert-manager already installed in local cluster

redirect:
  namespace: "deco-redirect-system"
  ingressClass: "nginx"
  clusterIssuer:
    enabled: false   # habilitar em prod com email e staging: false
    name: "letsencrypt"

ingressNginx:
  enabled: true
  controller:
    service:
      annotations: {}   # sem NLB/EIP — adicione annotations de cloud em prod
webhook:
  enabled: false
leaderElection:
  enabled: false

github:
  existingSecret: deco-operator-github-token
  existingSecretKey: token

valkey:
  sentinelUrls: ""

cfworkers:
  existingSecret: deco-operator-cfworkers
  artifactsBucket: new-deco-cfworkers-deployments
  builderImage: "igoramf/cfworkers-builder:v8"

s3:
  existingSecret: deco-operator-s3
  region: us-west-2
  logsBucket: new-deco-sites-build-logs
  stateBucket: new-deco-admin-states

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
