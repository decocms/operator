---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: decobuilds.deco.sites
spec:
  group: deco.sites
  names:
    kind: DecoBuild
    listKind: DecoBuildList
    plural: decobuilds
    singular: decobuild
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.source.repo
      name: Repo
      type: string
    - jsonPath: .spec.target.type
      name: Target
      type: string
    - jsonPath: .spec.source.commitSha
      name: Commit
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DecoBuild is the Schema for the decobuilds API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: DecoBuildSpec defines the desired state of a build.
            properties:
              build:
                description: Build describes the build mechanism. Defaults to k8s-job when omitted.
                properties:
                  type:
                    description: Type is the build mechanism. Currently only k8s-job is supported.
                    type: string
                type: object
              source:
                description: Source describes the code to build.
                properties:
                  owner:
                    description: Owner is the GitHub repository owner/org.
                    type: string
                  repo:
                    description: Repo is the GitHub repository name.
                    type: string
                  commitSha:
                    description: CommitSha is the git commit SHA to build.
                    type: string
                  production:
                    description: Production indicates whether this is a production deploy.
                    type: boolean
                  branchRef:
                    description: BranchRef is the branch name used as preview alias (non-production only).
                    type: string
                required:
                - owner
                - repo
                - commitSha
                type: object
              builder:
                description: Builder overrides the builder image.
                properties:
                  image:
                    description: Image is the full image reference (repository:tag).
                    type: string
                required:
                - image
                type: object
              artifact:
                description: Artifact describes where the build output is stored after a successful build.
                properties:
                  bucket:
                    description: Bucket is the S3 bucket name.
                    type: string
                  key:
                    description: Key is the S3 object key. Supports {repo} and {commitSha} placeholders.
                    type: string
                required:
                - bucket
                - key
                type: object
              target:
                description: Target describes the deploy target platform.
                properties:
                  type:
                    description: 'Type is the target runtime platform. Supported: cloudflare-worker'
                    type: string
                  cloudflare-worker:
                    description: CloudflareWorker contains settings specific to Cloudflare Workers deployments.
                    properties:
                      entryPoint:
                        description: EntryPoint is the worker entry file path. Defaults to src/worker-entry.ts.
                        type: string
                      compatDate:
                        description: CompatDate is the Cloudflare compatibility date. Defaults to 2025-04-01.
                        type: string
                    type: object
                required:
                - type
                type: object
            required:
            - source
            - target
            type: object
          status:
            description: DecoBuildStatus defines the observed state of a DecoBuild.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              jobName:
                type: string
              phase:
                type: string
              startTime:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
