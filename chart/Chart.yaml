  - knative
  - decofile
  - deco
  - deco-cms
  - configuration-management
home: https://github.com/decocms/operator
sources:
  - https://github.com/decocms/operator
maintainers:
  - name: Deco CMS Team
    url: https://github.com/decocms
icon: https://deco.cx/favicon.ico

dependencies:
  - name: ingress-nginx
    version: "4.12.1"
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled

