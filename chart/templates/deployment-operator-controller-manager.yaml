apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: operator
    control-plane: controller-manager
  name: {{ .Release.Name }}-controller-manager
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8080
        - --metrics-secure=false
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        {{- if .Values.redirect.ingressClass }}
        - --redirect-ingress-class={{ .Values.redirect.ingressClass }}
        - --redirect-cluster-issuer={{ .Values.redirect.clusterIssuer.name }}
        {{- end }}
        command:
        - /manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        {{- if or (and .Values.github (or .Values.github.token .Values.github.existingSecret)) .Values.redirectApi.existingSecret .Values.redirectApi.username (and .Values.valkey (get .Values.valkey "sentinelUrls")) .Values.cfworkers.existingSecret .Values.cfworkers.builderImage .Values.cfworkers.artifactsBucket .Values.s3.region .Values.s3.logsBucket .Values.s3.stateBucket .Values.build.serviceAccount .Values.build.roleArn .Values.build.nodeSelector .Values.build.tolerations }}
        env:
        {{- if and .Values.github .Values.github.existingSecret }}
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.github.existingSecret | quote }}
              key: {{ .Values.github.existingSecretKey | default "token" | quote }}
        {{- else if and .Values.github .Values.github.token }}
        - name: GITHUB_TOKEN
          value: {{ .Values.github.token | quote }}
        {{- end }}
        {{- with .Values.valkey }}
        {{- if .sentinelUrls }}
        - name: VALKEY_SENTINEL_URLS
          value: {{ .sentinelUrls | quote }}
        - name: VALKEY_SENTINEL_MASTER_NAME
          value: {{ .sentinelMasterName | quote }}
        {{- if .existingSecret }}
        - name: VALKEY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .existingSecret | quote }}
              key: {{ .existingSecretKey | quote }}
        {{- else if .adminPassword }}
        - name: VALKEY_ADMIN_PASSWORD
          value: {{ .adminPassword | quote }}
        {{- if .Values.redirectApi.existingSecret }}
        - name: REDIRECT_API_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redirectApi.existingSecret | quote }}
              key: REDIRECT_API_USER
        - name: REDIRECT_API_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redirectApi.existingSecret | quote }}
              key: REDIRECT_API_PASSWORD
        {{- else if .Values.redirectApi.username }}
        - name: REDIRECT_API_USER
          value: {{ .Values.redirectApi.username | quote }}
        - name: REDIRECT_API_PASSWORD
          value: {{ .Values.redirectApi.password | quote }}
        {{- end }}
        {{- if .Values.redirectApi.addr }}
        - name: REDIRECT_API_ADDR
          value: {{ .Values.redirectApi.addr | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.cfworkers }}
        {{- if .existingSecret }}
        - name: CLOUDFLARE_API_WORKERS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .existingSecret | quote }}
              key: cf-api-token
        - name: CLOUDFLARE_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .existingSecret | quote }}
              key: cf-account-id
        {{- end }}
        {{- if .builderImage }}
        - name: CFWORKERS_BUILDER_IMAGE
          value: {{ .builderImage | quote }}
        {{- end }}
        {{- if .artifactsBucket }}
        - name: S3_ARTIFACTS_BUCKET
          value: {{ .artifactsBucket | quote }}
        {{- end }}
        {{- end }}
        {{- with .Values.s3 }}
        {{- if .region }}
        - name: S3_REGION
          value: {{ .region | quote }}
        {{- end }}
        {{- if .logsBucket }}
        - name: S3_LOGS_BUCKET
          value: {{ .logsBucket | quote }}
        {{- end }}
        {{- if .stateBucket }}
        - name: S3_STATE_BUCKET
          value: {{ .stateBucket | quote }}
        {{- end }}
        {{- end }}
        {{- with .Values.build }}
        {{- if .serviceAccount }}
        - name: BUILD_SERVICE_ACCOUNT
          value: {{ .serviceAccount | quote }}
        {{- end }}
        {{- if .roleArn }}
        - name: BUILD_ROLE_ARN
          value: {{ .roleArn | quote }}
        {{- end }}
        {{- if .nodeSelector }}
        - name: BUILD_NODE_SELECTOR
          value: {{ .nodeSelector | toJson | quote }}
        {{- end }}
        {{- if .tolerations }}
        - name: BUILD_TOLERATIONS
          value: {{ .tolerations | toJson | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 8000m
            memory: 16Gi
          requests:
            cpu: 1000m
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Release.Name }}-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: webhook-certs
        secret:
          secretName: webhook-server-cert