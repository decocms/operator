apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: decos.deco.sites
spec:
  group: deco.sites
  names:
    kind: Deco
    listKind: DecoList
    plural: decos
    singular: deco
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.site
      name: Site
      type: string
    - jsonPath: .spec.serving.type
      name: Serving
      type: string
    - jsonPath: .spec.build.source.commitSha
      name: Commit
      type: string
    - jsonPath: .status.build.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Deco is the Schema for the decos API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DecoSpec defines the desired state of a Deco workload.
            properties:
              build:
                description: Build describes the production build pipeline.
                properties:
                  builder:
                    description: Builder overrides the builder image (repository:tag).
                    type: string
                  source:
                    description: |-
                      Source identifies the code revision to build.
                      Repository and owner come from spec.site and spec.org.
                    properties:
                      branchRef:
                        description: BranchRef is the branch name for preview aliases
                          (non-production only).
                        type: string
                      commitSha:
                        description: |-
                          CommitSha is the git commit SHA to build.
                          Updating this field triggers a new build.
                        type: string
                      production:
                        description: Production indicates whether this is a production
                          deploy.
                        type: boolean
                    required:
                    - commitSha
                    type: object
                  type:
                    description: Type is the build mechanism. Currently only k8s-job
                      is supported.
                    type: string
                required:
                - source
                type: object
              framework:
                description: Framework is the site framework. deno | tanstack | next
                  | remix | static
                type: string
              org:
                description: Org is the GitHub organization or owner.
                type: string
              previews:
                description: |-
                  Previews configures preview builds for this site.
                  Admin adds entries to Previews.Active on PR open and removes on PR close.
                properties:
                  active:
                    description: |-
                      Active is the list of preview builds currently requested.
                      Admin adds entries on PR open, removes on PR close.
                    items:
                      description: DecoPreviewRequest identifies a single preview
                        build request.
                      properties:
                        branchRef:
                          description: BranchRef is the branch or PR ref (used as
                            the wrangler preview alias).
                          type: string
                        commitSha:
                          description: CommitSha is the git commit SHA to build.
                          type: string
                        prId:
                          description: PrId is the pull request ID, for tracking.
                          type: string
                      required:
                      - branchRef
                      - commitSha
                      type: object
                    type: array
                  maxActive:
                    description: |-
                      MaxActive is the maximum number of concurrent previews the operator will build.
                      Operator processes only the most recent MaxActive entries in Active.
                    format: int32
                    type: integer
                  ttl:
                    description: TTL is the duration after which completed previews
                      are eligible for cleanup (e.g. "48h").
                    type: string
                  type:
                    description: Type is the preview runtime. cloudflare-preview |
                      statefulset | sandbox
                    type: string
                required:
                - type
                type: object
              serving:
                description: Serving describes the runtime serving configuration.
                properties:
                  type:
                    description: |-
                      Type is the serving runtime. Drives both serving and build job selection.
                      Supported: cloudflare-worker | knative | deployment
                    type: string
                required:
                - type
                type: object
              site:
                description: Site is the site/repository name.
                type: string
              type:
                description: Type is the workload type. site | server | admin | preview
                type: string
            required:
            - org
            - site
            type: object
          status:
            description: DecoStatus defines the observed state of a Deco workload.
            properties:
              build:
                description: Build tracks the current production build lifecycle.
                properties:
                  commitSha:
                    description: CommitSha is the commit currently being built (or
                      last attempted).
                    type: string
                  completionTime:
                    description: CompletionTime is when the current build finished.
                    format: date-time
                    type: string
                  jobName:
                    description: JobName is the K8s Job name for the current build.
                    type: string
                  lastBuiltCommit:
                    description: LastBuiltCommit is the commit SHA of the last successful
                      build.
                    type: string
                  phase:
                    description: 'Phase is the current build phase: Running | Succeeded
                      | Failed'
                    type: string
                  startTime:
                    description: StartTime is when the current build started.
                    format: date-time
                    type: string
                type: object
              previews:
                description: Previews tracks the build status of each active preview.
                items:
                  description: DecoPreviewStatus tracks the build status of a single
                    preview.
                  properties:
                    branchRef:
                      type: string
                    commitSha:
                      type: string
                    completionTime:
                      format: date-time
                      type: string
                    jobName:
                      type: string
                    phase:
                      type: string
                    prId:
                      type: string
                    startTime:
                      format: date-time
                      type: string
                  required:
                  - branchRef
                  - commitSha
                  - phase
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}