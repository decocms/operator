---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: decos.deco.sites
spec:
  group: deco.sites
  names:
    kind: Deco
    listKind: DecoList
    plural: decos
    singular: deco
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.site
      name: Site
      type: string
    - jsonPath: .spec.serving.type
      name: Serving
      type: string
    - jsonPath: .spec.build.source.commitSha
      name: Commit
      type: string
    - jsonPath: .status.build.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Deco is the Schema for the decos API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: DecoSpec defines the desired state of a Deco workload.
            properties:
              type:
                description: Type is the workload type. site | server | admin | preview
                type: string
              site:
                description: Site is the site/repository name.
                type: string
              org:
                description: Org is the GitHub organization or owner.
                type: string
              framework:
                description: Framework is the site framework. deno | tanstack | next | remix | static
                type: string
              build:
                description: Build describes the build pipeline.
                properties:
                  type:
                    description: Type is the build mechanism. Currently only k8s-job is supported.
                    type: string
                  builder:
                    description: Builder overrides the builder image (repository:tag).
                    type: string
                  source:
                    description: Source identifies the code revision to build.
                    properties:
                      commitSha:
                        description: CommitSha is the git commit SHA to build. Updating this field triggers a new build.
                        type: string
                      production:
                        description: Production indicates whether this is a production deploy.
                        type: boolean
                      branchRef:
                        description: BranchRef is the branch name for preview aliases (non-production only).
                        type: string
                    required:
                    - commitSha
                    type: object
                required:
                - source
                type: object
              serving:
                description: Serving describes the runtime serving configuration. Also drives build job selection.
                properties:
                  type:
                    description: 'Type is the serving runtime. Supported: cloudflare-worker | knative | deployment'
                    type: string
                required:
                - type
                type: object
            required:
            - site
            - org
            type: object
          status:
            description: DecoStatus defines the observed state of a Deco workload.
            properties:
              build:
                description: Build tracks the current build lifecycle.
                properties:
                  phase:
                    description: 'Phase is the current build phase: Running | Succeeded | Failed'
                    type: string
                  commitSha:
                    description: CommitSha is the commit currently being built (or last attempted).
                    type: string
                  lastBuiltCommit:
                    description: LastBuiltCommit is the commit SHA of the last successful build.
                    type: string
                  jobName:
                    description: JobName is the K8s Job name for the current build.
                    type: string
                  startTime:
                    format: date-time
                    type: string
                  completionTime:
                    format: date-time
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
