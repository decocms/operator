# Default values for deco-operator
# Manages Decofile resources for Deco CMS applications

# Image configuration
image:
  repository: ghcr.io/decocms/operator
  tag: latest
  pullPolicy: IfNotPresent

# Number of replicas
replicaCount: 2

# GitHub token for private repositories (optional)
# If not set, operator will only work with public repos
github:
  token: ""

# Valkey (Redis) ACL provisioning
# When sentinelUrls is set, the operator provisions per-tenant ACL users in Valkey
# for each namespace annotated with deco.sites/valkey-acl: "true".
# Leave sentinelUrls empty to disable ACL provisioning (NoopClient).
valkey:
  sentinelUrls: ""
  sentinelMasterName: "mymaster"
  # adminPassword: inline value (not recommended for production).
  # Use existingSecret + existingSecretKey to source from a K8s Secret instead.
  adminPassword: ""
  existingSecret: ""
  existingSecretKey: "password"

# Resource limits and requests
resources:
  limits:
    cpu: 8000m
    memory: 16Gi
  requests:
    cpu: 1000m
    memory: 2Gi

# cert-manager must be installed cluster-wide (required when webhook.enabled=true).
# Install separately: helm install cert-manager jetstack/cert-manager \
#   -n cert-manager --create-namespace --set crds.enabled=true
certManager:
  enabled: true

# Webhook configuration
webhook:
  enabled: true

# Health probe configuration
healthProbe:
  bindAddress: ":8081"
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

# Metrics configuration
metrics:
  enabled: true
  port: 8080

# Leader election
leaderElection:
  enabled: true

# Security context
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Controllers to enable at startup.
# Use ["*"] to enable all (default — preserves existing behavior).
# Valid values: namespace, decofile, deco, decoredirect, operator-api
controllers:
  enabled:
    - "*"

# Cloudflare Workers build support
cfworkers:
  existingSecret: ""    # Secret with cf-api-token, cf-account-id
  builderImage: ""      # Builder container image (repository:tag)
  artifactsBucket: ""   # S3 bucket for build artifacts (cfworkers-specific)

# S3 config — shared across all build platforms (credentials via Pod Identity)
s3:
  region: ""            # AWS region (e.g. us-east-1)
  logsBucket: ""        # S3 bucket for build logs
  stateBucket: ""       # S3 bucket for site state

# Build job config — shared across all build platforms
build:
  serviceAccount: ""    # K8s ServiceAccount for builder pods (IRSA)
  roleArn: ""           # IAM role ARN for IRSA annotation on the ServiceAccount
  nodeSelector: {}      # Default nodeSelector for build pods (overridable per-site via spec.build.nodeSelector)
  tolerations: []       # Default tolerations for build pods (overridable per-site via spec.build.tolerations)

# ── Unified secret env ───────────────────────────────────────────────────────
# A single Secret whose KEYS ARE THE ENV VAR NAMES (e.g. CLOUDFLARE_API_WORKERS_TOKEN,
# CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_KV_API_TOKEN, GITHUB_TOKEN, GITHUB_APP_ID,
# GITHUB_APP_PRIVATE_KEY, GITHUB_WEBHOOK_SECRET, DECO_PURGE_TOKEN). Injected
# wholesale via envFrom, so adding a new secret env is just a new key on the
# backing ExternalSecret — no chart change. Preferred over the per-feature
# existingSecret knobs above; those still work when set (and win, being explicit env).
secretEnv:
  existingSecret: ""

# ── Fast deploy (KV-first content) ───────────────────────────────────────────
# Git-webhook → Decofile CR → self-cleaning KV-sync Job. The webhook/KV/GitHub-App
# secrets come from secretEnv above (GITHUB_WEBHOOK_SECRET enables the endpoint;
# the operator-api controller must also be enabled). Only the non-secret syncer
# image lives here.
fastDeploy:
  syncerImage: ""            # decofile-syncer image (repository:tag) → DECOFILE_SYNCER_IMAGE

# ── Operator Management API ──────────────────────────────────────────────────
# General HTTP API for managing operator resources (DecoRedirects, etc.).
# Enabled when username+password (or existingSecret) are set.
# Set hostname to auto-create an Ingress+Certificate via the cluster default ingress.
operatorApi:
  addr: ":9090"
  hostname: ""           # e.g. "operator.infra.deco.cx" — creates Ingress+Certificate automatically
  ingressClass: ""       # leave empty to use the cluster default ingress (recommended)
  clusterIssuer: ""      # cert-manager ClusterIssuer; defaults to redirect.clusterIssuer.name if empty
  existingSecret: ""     # Secret with keys OPERATOR_API_USER and OPERATOR_API_PASSWORD

# ── Domain Redirect ──────────────────────────────────────────────────────────
# Application-level redirect config — all features are opt-in.
# Set ingressClass to enable DecoRedirect reconciliation.
redirect:
  namespace: "deco-redirect-system"
  ingressClass: ""          # set to enable DecoRedirect controller (e.g. "redirect-nginx")
  blockedIPv6CIDRs: []      # IPv6 CIDRs that block cert issuance when present in AAAA records (e.g. ["2600:1901::/32"])
  clusterIssuer:
    enabled: false          # set true to create the Let's Encrypt ClusterIssuer
    name: ""                # ClusterIssuer name (e.g. "letsencrypt")
    email: ""               # required by Let's Encrypt ACME
    staging: false          # set true to use Let's Encrypt staging (avoids rate limits when testing)
    solverAnnotations: {}   # extra annotations on the HTTP-01 challenge Ingress (e.g. nginx.ingress.kubernetes.io/ssl-redirect: "false")
  customHeaders:
    enabled: false  # set true to inject custom response headers into all redirects served by this nginx instance
    headers: {}     # map of header name → value; e.g. X-Redirect-By: "deco"
    # Example:
    #   headers:
    #     X-Redirect-By: "deco"
    #     X-Powered-By: "myplatform"

# ingress-nginx subchart (opt-in) — set enabled: true to deploy nginx alongside the operator.
# namespaceOverride isolates nginx from the operator namespace.
# AWS NLB/EIP annotations go under controller.service.annotations.
ingress-nginx:
  enabled: false
  namespaceOverride: "deco-redirect-system"
  controller:
    ingressClass: redirect-nginx
    ingressClassResource:
      name: redirect-nginx
      controllerValue: "k8s.io/redirect-nginx"
    service:
      annotations: {}
    config:
      # Set to "<redirect.namespace>/redirect-response-headers" when redirect.customHeaders.enabled=true.
      # The ConfigMap is only created when redirect.customHeaders.enabled=true.
      add-headers: ""

# Name overrides
nameOverride: ""
fullnameOverride: ""

