# Default values for deco-operator
# Manages Decofile resources for Deco CMS applications

# Image configuration
image:
  repository: ghcr.io/decocms/operator
  tag: latest
  pullPolicy: IfNotPresent

# Number of replicas
replicaCount: 2

# GitHub token for private repositories (optional)
# If not set, operator will only work with public repos
github:
  token: ""

# Valkey (Redis) ACL provisioning
# When sentinelUrls is set, the operator provisions per-tenant ACL users in Valkey
# for each namespace annotated with deco.sites/valkey-acl: "true".
# Leave sentinelUrls empty to disable ACL provisioning (NoopClient).
valkey:
  sentinelUrls: ""
  sentinelMasterName: "mymaster"
  # adminPassword: inline value (not recommended for production).
  # Use existingSecret + existingSecretKey to source from a K8s Secret instead.
  adminPassword: ""
  existingSecret: ""
  existingSecretKey: "password"

# Resource limits and requests
resources:
  limits:
    cpu: 8000m
    memory: 16Gi
  requests:
    cpu: 1000m
    memory: 2Gi

# cert-manager configuration
certManager:
  enabled: true

# Webhook configuration
webhook:
  enabled: true

# Health probe configuration
healthProbe:
  bindAddress: ":8081"
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

# Metrics configuration
metrics:
  enabled: true
  port: 8080

# Leader election
leaderElection:
  enabled: true

# Security context
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Cloudflare Workers build support
cfworkers:
  existingSecret: ""    # Secret with cf-api-token, cf-account-id
  builderImage: ""      # Builder container image (repository:tag)
  artifactsBucket: ""   # S3 bucket for build artifacts (cfworkers-specific)

# S3 config — shared across all build platforms (credentials via Pod Identity)
s3:
  region: ""            # AWS region (e.g. us-east-1)
  logsBucket: ""        # S3 bucket for build logs
  stateBucket: ""       # S3 bucket for site state

# Build job config — shared across all build platforms
build:
  serviceAccount: ""    # K8s ServiceAccount for builder pods (IRSA)
  roleArn: ""           # IAM role ARN for IRSA annotation on the ServiceAccount
  nodeSelector: {}      # Default nodeSelector for build pods (overridable per-site via spec.build.nodeSelector)
  tolerations: []       # Default tolerations for build pods (overridable per-site via spec.build.tolerations)

# ── Domain Redirect ──────────────────────────────────────────────────────────
# Application-level redirect config — all features are opt-in.
# Set ingressClass to enable RedirectDomain reconciliation.
redirect:
  namespace: "deco-redirect-system"
  ingressClass: ""          # set to enable RedirectDomain controller (e.g. "redirect-nginx")
  clusterIssuer:
    enabled: false          # set true to create the Let's Encrypt ClusterIssuer
    name: ""                # ClusterIssuer name (e.g. "letsencrypt")
    email: ""               # required by Let's Encrypt ACME
    staging: false          # set true to use Let's Encrypt staging (avoids rate limits when testing)

# ingress-nginx subchart (opt-in) — set enabled: true to deploy nginx alongside the operator.
# namespaceOverride isolates nginx from the operator namespace.
# AWS NLB/EIP annotations go under controller.service.annotations.
ingress-nginx:
  enabled: false
  namespaceOverride: "deco-redirect-system"
  controller:
    ingressClass: redirect-nginx
    ingressClassResource:
      name: redirect-nginx
      controllerValue: "k8s.io/redirect-nginx"
    service:
      annotations: {}

# cert-manager must be installed cluster-wide (required when webhook.enabled=true).
# Install separately: helm install cert-manager jetstack/cert-manager \
#   -n cert-manager --create-namespace --set crds.enabled=true

# Name overrides
nameOverride: ""
fullnameOverride: ""

